<section class="topic-section" [ngClass]="subject.title ? subject.title : ''">
  <h2 [ngStyle]="{ color: subject.color }" class="topic-title">
    {{ subject.title }}
  </h2>

  <ul class="topics-list">
    @for (item of subject.topics; track $index) {
    <li>
      <a class="topics-link" routerLink="{{ item.route }}">
        <span>{{ item.title }}</span> &#x276F;
      </a>
    </li>
    }
  </ul>
</section>
